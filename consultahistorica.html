<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Consulta SCI-225 - Evaluaciones Anteriores</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <style>
    :root { --primary: #2c3e50; --accent: #e67e22; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
    .card { background: white; padding: 0 0 30px 0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; overflow: hidden; position: relative; }
    .header-img { width: 100%; max-height: 200px; display: block; object-fit: cover; }
    .content-padding { padding: 20px 30px; }
    
    #loginSection { padding: 40px 20px; display: block; }
    #appSection { display: none; }
    
    h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.3rem; line-height: 1.2; }
    input { width: 85%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 15px; outline: none; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 92%; transition: background 0.3s; margin-bottom: 10px;}
    button:hover { background: #d35400; }
    
    .btn-print { background: #7f8c8d; margin-top: 20px; width: 100%; }
    #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .result-box { margin-top: 25px; text-align: left; display: none; border-top: 2px solid #eee; padding-top: 20px; }
    .data-item { margin-bottom: 8px; font-size: 13px; }
    .label { font-weight: bold; color: #bd5302; text-transform: uppercase; font-size: 11px; display: block; }
    .value { font-size: 14px; color: var(--primary); }
    .error { color: #e74c3c; font-weight: bold; margin-top: 20px; display: none; }

    .table-container { width: 100%; overflow-x: auto; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 10px; background: white; }
    th, td { border: 1px solid #aaa; padding: 5px 2px; text-align: center; }
    th { background-color: #e67e22; color: #000000; font-size: 9px; }
    td:first-child { text-align: left; background-color: #f2f2f2; font-weight: bold; padding-left: 5px; width: 30%; }
    .col-prom { font-weight: bold; background-color: #fdf2e9; color: #d35400; border-left: 2px solid #d35400; }

    .eval-block { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    .only-print { display: none; }

    @media print {
      body { background: white; padding: 0; display: block; }
      .card { box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
      .header-img, h2, #rutInput, button, #loader, #errorMsg, #loginSection { display: none !important; }
      .result-box { display: block !important; border: none !important; }
      .only-print { display: block !important; text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
      .eval-block { page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 40px; }
    }
  </style>
</head>
<body>

<div class="card">
    <img src="https://lh3.googleusercontent.com/d/1TXWIMC4k9G0_7eDgGArDXhOGYViL7HGI" alt="Evaluación Desempeño SCI-225" class="header-img">  

  <div id="loginSection">
    <h2>Acceso al Sistema SCI-225</h2>
    <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Inicie sesión con su correo @conaf.cl para consultar evaluaciones.</p>
    <div id="buttonDiv" style="display: flex; justify-content: center;"></div>
  </div>

  <div id="appSection" class="content-padding">
    <h2>Consulta de Evaluación Desempeño SCI-225</h2>
    <input type="text" id="rutInput" placeholder="Ej: 12345678-9" maxlength="10">
    <button type="button" onclick="consultar()">BUSCAR PERSONAL</button>
    
    <div id="loader"></div>
    <div id="errorMsg" class="error"></div>

    <div id="resultBox" class="result-box">
      <h3 class="only-print">Evaluación de Desempeño SCI-225</h3>
      
      <div style="background: #fdf2e9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <div class="data-item"><span class="label">Nombre Evaluado:</span><span id="resNombre" class="value" style="font-weight:bold; font-size:18px;"></span></div>
      </div>

      <div id="contenedorEstados" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;"></div>

      <div id="canvasWrapper" style="width: 100%; max-width: 500px; margin: 0 auto 30px auto; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
        <canvas id="graficoEvolucion"></canvas>
      </div>

      <div id="contenedorTablas"></div>

      <button type="button" class="btn-print" onclick="window.print()">IMPRIMIR REPORTE COMPLETO</button>
    </div>
  </div>
</div>

<script>
  const CLIENT_ID = "624446664490-0h9hc0eq09bssftqe2m02mp1oigqiad5.apps.googleusercontent.com";
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby5-9MPWtGu2REuY5S4k9uWS0MgBd124KGpQitFWyOIxr14xi0iAOasJXvG-eLbFYQ7/exec";
  
  let USER_TOKEN = "";

  window.onload = function () {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: true 
    });
    google.accounts.id.renderButton(
      document.getElementById("buttonDiv"),
      { theme: "outline", size: "large", text: "signin_with", shape: "pill" } 
    );
    google.accounts.id.prompt(); 
  };

  function handleCredentialResponse(response) {
    USER_TOKEN = response.credential;
    if (USER_TOKEN) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('appSection').style.display = 'block';
    }
  }

async function consultar() {
  const rut = document.getElementById('rutInput').value.trim();
  const loader = document.getElementById('loader');
  const resultBox = document.getElementById('resultBox');
  const errorMsg = document.getElementById('errorMsg');
  const contenedorTablas = document.getElementById('contenedorTablas');
  const contenedorEstados = document.getElementById('contenedorEstados');

  if (rut.length < 8) { alert("RUT no válido"); return; }
  
  loader.style.display = "block";
  resultBox.style.display = "none";
  errorMsg.style.display = "none";
  contenedorTablas.innerHTML = ""; 
  contenedorEstados.innerHTML = "";

  try {
    const urlFinal = `${WEB_APP_URL}?rut=${encodeURIComponent(rut)}&token=${USER_TOKEN}&mode=historial&cb=${new Date().getTime()}`;
    const response = await fetch(urlFinal, { method: 'GET', mode: 'cors' });
    const data = await response.json();
    loader.style.display = "none";

    if (data.encontrado && data.historial) {
      document.getElementById('resNombre').innerText = data.nombre;

      data.historial.forEach((eval, index) => {
        const esAprobado = eval.resultado.toLowerCase().includes("aprobado");
        
        // 1. Casilla de Estado Superior
        const caja = document.createElement('div');
        caja.style = `border: 2px solid ${esAprobado ? '#27ae60' : '#e74c3c'}; border-radius: 8px; padding: 10px; text-align: center; min-width: 110px; background: white;`;
        caja.innerHTML = `
          <div style="font-size: 9px; color: #666; text-transform:uppercase;">${eval.mes}</div>
          <div style="font-size: 11px; font-weight: bold; color: ${esAprobado ? '#27ae60' : '#e74c3c'};">${eval.resultado}</div>
        `;
        contenedorEstados.appendChild(caja);

        let valorDB = (eval.firmaRRHH || "").toString().trim().toLowerCase();
        let firmaContenido = (valorDB === "sí" || valorDB === "si") 
            ? `<span style="color:#27ae60; font-weight:bold;">✓ SÍ</span>` 
            : `<span style="color:#e74c3c; font-weight:bold;">✗ NO</span>`;

        // 2. Crear Bloque Completo por Período
        const evalBlock = document.createElement('div');
        evalBlock.className = "eval-block";
        evalBlock.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e67e22; padding-bottom: 5px; margin-bottom: 15px;">
            <h4 style="margin:0; color:#e67e22;">PERÍODO: ${eval.mes} ${eval.periodo ? '- ' + eval.periodo : ''}</h4>
            <span style="background:${esAprobado ? '#27ae60' : '#e74c3c'}; color:white; padding:3px 10px; border-radius:15px; font-size:12px; font-weight:bold;">${eval.resultado}</span>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px;">
             <div class="data-item"><span class="label">Cargo Evaluado:</span><span class="value">${eval.cargo || 'No especificado'}</span></div>
             <div class="data-item"><span class="label">Brigada:</span><span class="value">${eval.brigada || 'No especificada'}</span></div>
             <div class="data-item"><span class="label">Zona:</span><span class="value">${eval.zona || 'No especificada'}</span></div>
             <div class="data-item"><span class="label">Evaluado por:</span><span class="value">${eval.evaluador || 'No especificado'}</span></div>
             <div class="data-item" style="grid-column: span 2;"><span class="label">Cargo Evaluador:</span><span class="value">${eval.cargoEvaluador || 'No especificado'}</span></div>
          </div>

          <div class="table-container">
            <table>
              <thead><tr><th>FACTOR</th><th>COMBATE</th><th>LIQ.</th><th>CAMP.</th><th>OTRO</th><th>PROM.</th></tr></thead>
              <tbody>
                ${["Conocimiento del Trabajo", "Desempeño", "Actitud", "Bajo Presión", "Iniciativa", "Cuidado Personal", "Uso de Recursos", "Condición Física", "Seguridad", "Otros"]
                  .map((f, i) => `<tr><td>${f}</td><td>${eval.combate[i]}</td><td>${eval.liquidacion[i]}</td><td>${eval.campamento[i]}</td><td>${eval.otros[i]}</td><td class="col-prom">${eval.promedios[i]}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
          
          <div class="data-item"><span class="label">Observaciones:</span><span class="value" style="font-style:italic;">${eval.observaciones || "Sin observaciones."}</span></div>
          
          <div style="margin-top:15px; padding: 10px; background: #f4f7f6; border-radius: 4px; border: 1px solid #ddd;">
            <span style="font-size: 11px; color: #2c3e50;">
              Esta evaluación está firmada por el/la evaluado/a y almacenada en RRHH de la región correspondiente: 
              ${firmaContenido}
            </span>
          </div>
        `;
        contenedorTablas.appendChild(evalBlock);
      }); 

      // Configuración del Gráfico
      const ctx = document.getElementById('graficoEvolucion').getContext('2d');
      const colores = ['#e67e22', '#2c3e50', '#27ae60', '#e74c3c', '#9b59b6'];
      
      if (window.miGrafico) window.miGrafico.destroy();
      Chart.register(ChartDataLabels);

      window.miGrafico = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ["Conoc.", "Desemp.", "Actitud", "Presión", "Inic.", "Cuid.", "Recur.", "Cond.", "Segur.", "Otros"],
          datasets: data.historial.map((h, i) => ({
            label: h.mes,
            data: h.promedios,
            backgroundColor: colores[i % colores.length]
          }))
        },
        options: { 
          responsive: true, 
          plugins: { 
            legend: { position: 'bottom' },
            datalabels: {
              anchor: 'end',
              align: 'top',
              formatter: (value) => value,
              font: { weight: 'bold', size: 9 }
            }
          },
          scales: { 
            y: { 
              beginAtZero: true, 
              suggestedMax: 4,
              ticks: { stepSize: 1 } 
            } 
          } 
        }
      });

      resultBox.style.display = "block";
    } else {
      errorMsg.innerText = data.mensaje;
      errorMsg.style.display = "block";
    }
  } catch (e) {
    console.error(e);
    loader.style.display = "none";
    errorMsg.innerText = "Error de conexión.";
    errorMsg.style.display = "block";
  }
}
</script>
</body>
</html>
