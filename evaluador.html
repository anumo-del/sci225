  <style>
    :root { --primary: #2c3e50; --accent: #e67e22; --blue: #3498db; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
    
    .card { background: white; padding: 0 0 30px 0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; overflow: hidden; }
    .header-img { width: 100%; height: auto; max-height: 200px; display: block; object-fit: cover; }
    .content-padding { padding: 30px; }
    
    #loginSection { padding: 40px 20px; display: block; }
    #appSection { display: none; }
    
    h2 { color: var(--primary); margin-bottom: 25px; font-size: 1.4rem; }

    /* Estilo para los botones de navegación */
    .btn-nav { 
      display: block; 
      text-decoration: none;
      background: var(--accent); 
      color: white; 
      padding: 20px; 
      border-radius: 8px; 
      font-weight: bold; 
      font-size: 18px;
      margin-bottom: 20px; 
      transition: transform 0.2s, background 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .btn-nav:hover { 
      background: #d35400; 
      transform: translateY(-2px);
    }

    .btn-form { 
      background: var(--blue); 
    }
    
    .btn-form:hover { 
      background: #2980b9; 
    }

  </style>
