<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ... Mantenemos todos tus estilos CSS exactamente igual ... */
    :root { --primary: #2c3e50; --accent: #e67e22; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
    .card { background: white; padding: 0 0 30px 0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; overflow: hidden; position: relative; }
    .header-img { width: 100%; height: auto; max-height: 200px; display: block; object-fit: cover; }
    .content-padding { padding: 20px 30px; }
    h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.3rem; line-height: 1.2; }
    input { width: 85%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 15px; outline: none; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 92%; transition: background 0.3s; margin-bottom: 10px;}
    button:hover { background: #d35400; }
    .btn-print { background: #7f8c8d; margin-top: 20px; width: 100%; }
    .btn-print:hover { background: #616a6b; }
    #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .result-box { margin-top: 25px; text-align: left; display: none; border-top: 2px solid #eee; padding-top: 20px; }
    .data-item { margin-bottom: 10px; font-size: 14px; }
    .label { font-weight: bold; color: #bd5302; text-transform: uppercase; font-size: 14px; display: block; }
    .value { font-size: 16px; color: var(--primary); }
    .error { color: #e74c3c; font-weight: bold; margin-top: 20px; display: none; }
    .table-container { width: 100%; overflow-x: auto; margin: 20px 0; border: 1px solid #ccc; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 10px; background: white; }
    th, td { border: 1px solid #aaa; padding: 5px 2px; text-align: center; }
    th { background-color: #2c3e50; color: white; font-size: 9px; }
    td:first-child { text-align: left; background-color: #f2f2f2; font-weight: bold; padding-left: 5px; width: 30%; }
    .col-prom { font-weight: bold; background-color: #fdf2e9; color: #d35400; border-left: 2px solid #d35400; }
    @media print {
      body { background: white; padding: 0; display: block; }
      .header-img, h2, #rutInput, button:not(.btn-print), #loader, #errorMsg, hr { display: none !important; }
      .card { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; margin: 0; }
      .content-padding { padding: 0; }
      .result-box { display: block !important; border: none; padding-top: 0; margin-top: 0; }
      .btn-print { display: none !important; }
      .table-container { border: none; margin: 10px 0; }
      th { background-color: #eee !important; color: black !important; border: 1px solid #000; }
      td { border: 1px solid #000; }
      .col-prom { background-color: #fff !important; color: black !important; }
    }
    .print-only-title { display: none; text-align: center; font-size: 20px; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
    @media print { .print-only-title { display: block !important; } }
  </style>
</head>
<body>

<div class="card">
  <img src="https://conaf.cl/wp-content/uploads/2014/11/logo-conaf.png" alt="Logo CONAF" class="header-img"> 
  
  <div class="content-padding">
    <h2>Consulta de Evaluación Desempeño SCI-225 Temporada 2025-2026</h2>
    <input type="text" id="rutInput" placeholder="Ej: 12345678-9" maxlength="10">
    <button type="button" onclick="consultar()">BUSCAR PERSONAL</button>
    
    <div id="loader"></div>
    <div id="errorMsg" class="error"></div>

    <div id="resultBox" class="result-box">
      <h1 class="print-only-title">Evaluación de Desempeño Temporada 2025-2026</h1>
      
      <div class="data-item"><span class="label">Nombre Completo</span><span id="resNombre" class="value"></span></div>
      <div class="data-item"><span class="label">Cargo</span><span id="resCargo" class="value"></span></div>
      <div class="data-item"><span class="label">Brigada</span><span id="resBrigada" class="value"></span></div>
      <div class="data-item"><span class="label">Zona</span><span id="resZona" class="value"></span></div>
      
      <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
      
      <div class="data-item">
        <span class="label">Resultado Final</span>
        <span id="resResultado" class="value" style="font-weight:bold;"></span>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>FACTOR</th>
              <th>COMBATE</th>
              <th>LIQUIDACIÓN</th>
              <th>CAMPAMENTO</th>
              <th>OTRO</th>
              <th>PROMEDIO</th>
            </tr>
          </thead>
          <tbody id="tablaMatriz"></tbody>
        </table>
      </div>

      <div class="data-item">
        <span class="label">Observaciones</span>
        <span id="resObservaciones" class="value" style="font-weight:normal;"></span>
      </div>
      
      <button type="button" class="btn-print" onclick="imprimirResultado()">IMPRIMIR RESULTADO</button>
    </div>
  </div>
</div>

<script>
  // --- PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT (LA QUE TERMINA EN /exec) ---
  const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

  function consultar() {
    var rut = document.getElementById('rutInput').value.trim();
    var loader = document.getElementById('loader');
    var resultBox = document.getElementById('resultBox');
    var errorMsg = document.getElementById('errorMsg');

    if (rut.length < 8) {
      alert("Por favor ingrese un RUT válido.");
      return;
    }

    loader.style.display = "block";
    resultBox.style.display = "none";
    errorMsg.style.display = "none";

    // Reemplazamos google.script.run por fetch para GitHub
    fetch(`${WEB_APP_URL}?rut=${rut}`)
      .then(response => response.json())
      .then(data => {
        loader.style.display = "none";
        
        if (data.encontrado) {
          document.getElementById('resNombre').innerText = data.nombre;
          document.getElementById('resCargo').innerText = data.cargo;
          document.getElementById('resBrigada').innerText = data.brigada;
          document.getElementById('resZona').innerText = data.zona; 
          document.getElementById('resObservaciones').innerText = data.observaciones;

          var elResultado = document.getElementById('resResultado');
          var textoResultado = data.resultado ?? "---";
          elResultado.innerText = textoResultado;
          var comparacion = textoResultado.trim().toLowerCase();
          elResultado.style.color = (comparacion === "aprobado") ? "#27ae60" : (comparacion === "reprobado" ? "#e74c3c" : "#2c3e50");

          var factores = ["Conocimiento del Trabajo", "Desempeño", "Actitud", "Bajo Presión", "Iniciativa", "Cuidado Personal", "Uso de Recursos", "Condición Física", "Seguridad", "Otros"];
          var tbody = document.getElementById('tablaMatriz');
          tbody.innerHTML = "";

          factores.forEach(function(nombre, i) {
            var row = tbody.insertRow();
            row.insertCell(0).innerText = nombre;
            row.insertCell(1).innerText = data.combate[i];
            row.insertCell(2).innerText = data.liquidacion[i];
            row.insertCell(3).innerText = data.campamento[i];
            row.insertCell(4).innerText = data.otros[i];
            var cellProm = row.insertCell(5);
            cellProm.innerText = data.promedios[i];
            cellProm.className = "col-prom";
          });

          resultBox.style.display = "block";
        } else {
          errorMsg.innerText = data.mensaje ?? "RUT no encontrado.";
          errorMsg.style.display = "block";
        }
      })
      .catch(error => {
        loader.style.display = "none";
        errorMsg.innerText = "Error de conexión: Inicie sesión en Google con su cuenta @conaf.cl.";
        errorMsg.style.display = "block";
        console.error("Error detallado:", error);
      });
  }

  function imprimirResultado() {
    window.print();
  }
</script>
</body>
</html>
