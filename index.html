<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Consulta SCI-225</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Estilos originales */
    :root { --primary: #2c3e50; --accent: #e67e22; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
    .card { background: white; padding: 0 0 30px 0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; overflow: hidden; position: relative; }
    .header-img { width: 100%; height: auto; max-height: 200px; display: block; object-fit: cover; }
    .content-padding { padding: 20px 30px; }
    
    #loginSection { padding: 40px 20px; display: block; }
    #appSection { display: none; }
    
    h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.3rem; line-height: 1.2; }
    input { width: 85%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 15px; outline: none; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 92%; transition: background 0.3s; margin-bottom: 10px;}
    button:hover { background: #d35400; }
    
    .btn-print { background: #7f8c8d; margin-top: 20px; width: 100%; }
    #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .result-box { margin-top: 25px; text-align: left; display: none; border-top: 2px solid #eee; padding-top: 20px; }
    .data-item { margin-bottom: 10px; font-size: 14px; }
    .label { font-weight: bold; color: #bd5302; text-transform: uppercase; font-size: 14px; display: block; }
    .value { font-size: 16px; color: var(--primary); }
    .error { color: #e74c3c; font-weight: bold; margin-top: 20px; display: none; }

    .table-container { width: 100%; overflow-x: auto; margin: 20px 0; border: 1px solid #ccc; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 10px; background: white; }
    th, td { border: 1px solid #aaa; padding: 5px 2px; text-align: center; }
    th { background-color: #2c3e50; color: white; font-size: 9px; }
    td:first-child { text-align: left; background-color: #f2f2f2; font-weight: bold; padding-left: 5px; width: 30%; }
    .col-prom { font-weight: bold; background-color: #fdf2e9; color: #d35400; border-left: 2px solid #d35400; }

    /* ESTADO INICIAL DEL TÍTULO DE INFORME */
    #tituloInformeImpresion { display: none; }

    /* REGLAS DE IMPRESIÓN CORREGIDAS */
    @media print {
      body { background: white; padding: 0; display: block; }
      
      /* Ocultamos elementos innecesarios */
      .header-img, #loginSection, #rutInput, button:not(.btn-print), .btn-print, #loader, #errorMsg, hr, h2:not(#tituloInformeImpresion) { 
        display: none !important; 
      }
      
      /* Forzamos visibilidad del título del informe */
      #tituloInformeImpresion { 
        display: block !important; 
        color: #2c3e50 !important;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 25px;
        padding-bottom: 10px;
        border-bottom: 2px solid #2c3e50;
      }

      .card { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; margin: 0; }
      .result-box { display: block !important; border: none; padding-top: 0; margin-top: 0; }
    }
  </style>
</head>
