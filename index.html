<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema SCI-225</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root { --primary: #2c3e50; --accent: #e67e22; --blue: #3498db; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
    
    .card { background: white; padding: 0 0 30px 0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; overflow: hidden; }
    .header-img { width: 100%; height: auto; max-height: 200px; display: block; object-fit: cover; }
    .content-padding { padding: 30px; }
    
    #loginSection { padding: 40px 20px; display: block; }
    #appSection { display: none; }
    
    h2 { color: var(--primary); margin-bottom: 25px; font-size: 1.4rem; }

    /* Estilo para los botones de navegación */
    .btn-nav { 
      display: block; 
      text-decoration: none;
      background: var(--accent); 
      color: white; 
      padding: 20px; 
      border-radius: 8px; 
      font-weight: bold; 
      font-size: 18px;
      margin-bottom: 20px; 
      transition: transform 0.2s, background 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .btn-nav:hover { 
      background: #d35400; 
      transform: translateY(-2px);
    }

    .btn-form { 
      background: var(--blue); 
    }
    
    .btn-form:hover { 
      background: #2980b9; 
    }

  </style>
</head>
<body>

<div class="card">
  <img src="https://drive.google.com/file/d/1TXWIMC4k9G0_7eDgGArDXhOGYViL7HGI/view?usp=drive_link" alt="SCI-225" class="header-img"> 
  
  <div id="loginSection">
    <h2>Acceso al Sistema SCI-225 - Administrador</h2>
    <div id="buttonDiv" style="display: flex; justify-content: center;"></div>
  </div>

  <div id="appSection" class="content-padding">
    <h2>Seleccione una opción</h2>

    <a href="https://anumo-del.github.io/sci225/consulta.html" class="btn-nav">
      Consulta e impresión informes
    </a>

    <a href="https://anumo-del.github.io/sci225/evaluador.html" class="btn-nav btn-form">
      Ingreso Evaluador/a
    </a>

    <a href="AQUÍ_VA_TU_LINK_DE_CONSULTA" class="btn-nav btn-form">
      Ingreso Administrador Zonal
    </a>
  </div>
</div>

<script>
  // Tu configuración de cliente (Sin cambios)
  const CLIENT_ID = "624446664490-0h9hc0eq09bssftqe2m02mp1oigqiad5.apps.googleusercontent.com";
  
  window.onload = function () {
    google.accounts.id.initialize({ 
      client_id: CLIENT_ID, 
      callback: handleCredentialResponse 
    });
    google.accounts.id.renderButton(
      document.getElementById("buttonDiv"), 
      { theme: "outline", size: "large", shape: "pill" }
    );
  };

  function handleCredentialResponse(response) {
    if (response.credential) {
      // Al validar, solo mostramos los botones
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('appSection').style.display = 'block';
    }
  }
</script>

</body>
</html>
